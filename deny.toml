[advisories]
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Transitive duplicates from kube/ring ecosystem; skip the
# older versions until upstream consolidates.
skip = [
    { crate = "getrandom@0.2", reason = "ring 0.17 pins getrandom 0.2; ahash uses 0.3" },
    { crate = "hashbrown@0.16", reason = "kube-runtime pins 0.16; indexmap uses 0.17" },
    { crate = "windows-sys@0.52", reason = "ring/errno pin 0.52; mio/tokio use 0.61" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
